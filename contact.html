<!DOCTYPE html>
<html>
<head>
<title>Contact - Study Buddy</title>

<!-- 🌟 FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
}

/* HEADER */
header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:500;
}

/* 🌟 HERO */
.hero{
background:linear-gradient(to right, #1e293b, #3b82f6);
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:45px;
margin:0;
}

.hero p{
margin-top:10px;
font-size:18px;
}

/* 🌟 CARD */
.container{
background:white;
max-width:500px;
margin:50px auto;
padding:40px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-align:center;
}

/* EMAIL */
.email{
display:inline-block;
margin-top:10px;
background:#e0f2fe;
padding:10px 15px;
border-radius:8px;
font-weight:bold;
color:#0369a1;
}

/* BUTTONS */
button{
padding:12px 20px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
transition:0.3s;
}

.ask-btn{
background:#3b82f6;
color:white;
}

.ask-btn:hover{
background:#2563eb;
}

.feedback-btn{
background:#22c55e;
color:white;
}

.feedback-btn:hover{
background:#16a34a;
}

.bad-btn{
background:#ef4444;
color:white;
}

.bad-btn:hover{
background:#dc2626;
}

/* MESSAGE */
#message{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- 🌟 HERO -->
<section class="hero">
<h1>Contact Us!</h1>
<p>We'd love to hear from you </p>
</section>

<div class="container">

<p>Email us at:</p>
<div class="email">tziying30@renaissance.edu.vn</div>

<br><br>

<h2>Have a question?</h2>
<button class="ask-btn" onclick="askQuestion()">Ask a Question</button>

<h2>Do you like this website?</h2>
<button class="feedback-btn" onclick="feedback('good')">Yes</button>
<button class="bad-btn" onclick="feedback('bad')">No</button>

<p id="message"></p>

</div>

<script>

function askQuestion(){
let q = prompt("Type your question:");

if(q){
document.getElementById("message").innerText = "Your question has been noted! (demo)";
}
}

function feedback(type){
if(type === "good"){
document.getElementById("message").innerText = "Thanks for your feedback! 😊";
}else{
document.getElementById("message").innerText = "Thanks! We'll try to improve 🙏";
}
}

</script>

</body>
</html>

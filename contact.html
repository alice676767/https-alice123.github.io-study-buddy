<!DOCTYPE html>
<html>
<head>
<title>Contact - Study Buddy</title>

<style>
body{
margin:0;
font-family:Arial;
background:#f5f5f5;
}

header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
}

.container{
padding:80px;
text-align:center;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.ask-btn{
background:#3b82f6;
color:white;
}

.feedback-btn{
background:#22c55e;
color:white;
}

.bad-btn{
background:#ef4444;
color:white;
}

#message{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<div class="container">

<h1>Contact Us</h1>

<p>Email us at:</p>
<b>tziying30@renaissance.edu.vn</b>

<br><br>

<h2>Have a question?</h2>
<button class="ask-btn" onclick="askQuestion()">Ask a Question</button>

<h2>Do you like this website?</h2>
<button class="feedback-btn" onclick="feedback('good')"> Yes</button>
<button class="bad-btn" onclick="feedback('bad')"> No</button>

<p id="message"></p>

</div>

<script>

function askQuestion(){
let q = prompt("Type your question:");

if(q){
document.getElementById("message").innerText = "Your question has been noted! (demo)";
}
}

function feedback(type){
if(type === "good"){
document.getElementById("message").innerText = "Thanks for your feedback! 😊";
}else{
document.getElementById("message").innerText = "Thanks! We'll try to improve 🙏";
}
}

</script>

</body>
</html>

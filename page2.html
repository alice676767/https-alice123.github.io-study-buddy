<!DOCTYPE html>
<html>
<head>
<title>Volunteer - Study Buddy</title>

<!-- 🌟 FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
}

/* HEADER */
header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:500;
}

/* 🌟 HERO */
.hero{
background:linear-gradient(to right, #1e293b, #3b82f6);
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:45px;
margin:0;
}

.hero p{
margin-top:10px;
font-size:18px;
}

/* 🌟 FORM CARD */
.form-box{
background:white;
max-width:400px;
margin:40px auto;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-align:center;
}

input, select{
padding:12px;
margin:10px;
width:90%;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
}

/* BUTTONS */
.signup-btn{
padding:12px;
width:95%;
background:#3b82f6;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

.signup-btn:hover{
background:#2563eb;
}

.reset-btn{
padding:10px;
background:#ef4444;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

/* 🌟 VOLUNTEER LIST */
#list{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

/* CARD */
.card{
background:white;
padding:20px;
width:260px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:left;
position:relative;
}

.card b{
font-size:18px;
}

.badge{
display:inline-block;
margin-top:10px;
background:#3b82f6;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

/* REMOVE BUTTON */
.remove-btn{
margin-top:10px;
background:#ef4444;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}
</style>

</head>

<body onload="displayVolunteers()">

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- 🌟 HERO -->
<section class="hero">
<h1>Become a Volunteer</h1>
<p>Help others learn and grow </p>
</section>

<!-- 🌟 FORM -->
<div class="form-box">

<input type="text" id="name" placeholder="Your name and class">

<select id="day">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
</select>

<select id="time">
<option>10:00-10:30</option>
<option>1:00-1:30</option>
</select>

<button class="signup-btn" onclick="addVolunteer()">Sign Up</button>
<button class="reset-btn" onclick="clearVolunteers()">Reset Week</button>

</div>

<!-- 🌟 LIST -->
<div id="list"></div>

<!-- 🔗 Supabase script -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// Supabase connection
const SUPABASE_URL = "https://aaspzzucirsjwhmfgrva.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_gAMryTLf7AknfaUo2_2lFA_jHjTYuH2";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
</script>

<script>

// LOAD volunteers
function displayVolunteers() {
let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];
let listDiv = document.getElementById("list");
listDiv.innerHTML = ""; 

volunteers.forEach((v,index) => {
let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<b>${v.name}</b>
<br>
<span class="badge">${v.day} • ${v.time}</span>
<br>
<button class="remove-btn" onclick="removeVolunteer(${index})">Remove</button>
`;

listDiv.appendChild(card);
});
}

// ADD volunteer
function addVolunteer(){
let name = document.getElementById("name").value;
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

if(name === ""){
alert("Please enter your name");
return;
}

let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];

volunteers.push({ name: name, day: day, time: time });

localStorage.setItem("studyBuddyVolunteers", JSON.stringify(volunteers));

displayVolunteers();
document.getElementById("name").value = "";
}

// REMOVE
function removeVolunteer(index){
let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];
volunteers.splice(index,1);
localStorage.setItem("studyBuddyVolunteers", JSON.stringify(volunteers));
displayVolunteers();
}

// CLEAR
function clearVolunteers() {
if(confirm("Clear all volunteers?")) {
localStorage.removeItem("studyBuddyVolunteers");
displayVolunteers();
}
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<title>Volunteer - Study Buddy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
}

header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:500;
}

.hero{
background:linear-gradient(to right, #1e293b, #3b82f6);
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:45px;
margin:0;
}

.form-box{
background:white;
max-width:400px;
margin:40px auto;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-align:center;
}

input, select{
padding:12px;
margin:10px;
width:90%;
border:1px solid #ccc;
border-radius:8px;
}

.signup-btn{
padding:12px;
width:95%;
background:#3b82f6;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.reset-btn{
padding:10px;
background:#ef4444;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

#list{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
padding:20px;
width:260px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
}

.badge{
display:inline-block;
margin-top:10px;
background:#3b82f6;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.remove-btn{
margin-top:10px;
background:#ef4444;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Become a Volunteer</h1>
<p>Help others learn and grow</p>
</section>

<div class="form-box">

<input type="text" id="name" placeholder="Your name and class">

<select id="day">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
</select>

<select id="time">
<option>10:00-10:30</option>
<option>1:00-1:30</option>
</select>

<button class="signup-btn" onclick="addVolunteer()">Sign Up</button>
<button class="reset-btn" onclick="clearVolunteers()">Reset Week</button>

</div>

<div id="list"></div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://aaspzzucirsjwhmfgrva.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_gAMryTLf7AknfaUo2_2lFA_jHjTYuH2";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

console.log("🔥 Volunteer page connected to Supabase");

// ✅ FIX FOR GITHUB PAGES
window.addEventListener("DOMContentLoaded", () => {
  console.log("🚀 Page loaded");
  displayVolunteers();
});

// LOAD
async function displayVolunteers(){

let res = await supabaseClient.from("volunteers").select("*").order("id");

console.log("Volunteers:", res);

if(res.error){
alert("Error loading volunteers");
return;
}

let listDiv = document.getElementById("list");
listDiv.innerHTML = "";

(res.data || []).forEach(v => {
let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<b>${v.name}</b><br>
<span class="badge">${v.day} • ${v.time}</span><br>
<button class="remove-btn" onclick="removeVolunteer(${v.id})">Remove</button>
`;

listDiv.appendChild(card);
});
}

// ADD
async function addVolunteer(){

let name = document.getElementById("name").value.trim();
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

if(name === ""){
alert("Enter your name");
return;
}

// prevent duplicate slot
let check = await supabaseClient
.from("volunteers")
.select("*")
.eq("day", day)
.eq("time", time);

if(check.data.length > 0){
alert("Slot already taken!");
return;
}

// insert
let result = await supabaseClient.from("volunteers").insert([
{ name, day, time }
]);

console.log("Insert result:", result);

if(result.error){
alert("Error saving volunteer");
return;
}

document.getElementById("name").value = "";
displayVolunteers();
}

// REMOVE
async function removeVolunteer(id){
await supabaseClient.from("volunteers").delete().eq("id", id);
displayVolunteers();
}

// RESET
async function clearVolunteers(){
if(confirm("Clear all volunteers?")){
await supabaseClient.from("volunteers").delete().neq("id", 0);
displayVolunteers();
}
}
</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Volunteer - Study Buddy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<!-- ✅ SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
}

header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:500;
}

.hero{
background:linear-gradient(to right, #1e293b, #3b82f6);
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:45px;
margin:0;
}

.hero p{
margin-top:10px;
font-size:18px;
}

.form-box{
background:white;
max-width:400px;
margin:40px auto;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-align:center;
}

input, select{
padding:12px;
margin:10px;
width:90%;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
}

.signup-btn{
padding:12px;
width:95%;
background:#3b82f6;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

.reset-btn{
padding:10px;
background:#ef4444;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

#list{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
padding:20px;
width:260px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:left;
}

.badge{
display:inline-block;
margin-top:10px;
background:#3b82f6;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.remove-btn{
margin-top:10px;
background:#ef4444;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}
</style>

</head>

<body onload="displayVolunteers()">

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Become a Volunteer</h1>
<p>Help others learn and grow</p>
</section>

<div class="form-box">

<input type="text" id="name" placeholder="Your name and class">

<select id="day">
<option>Monday</option>
<option>Tuesday</option>
<option>Wednesday</option>
<option>Thursday</option>
<option>Friday</option>
</select>

<select id="time">
<option>10:00-10:30</option>
<option>1:00-1:30</option>
</select>

<button class="signup-btn" onclick="addVolunteer()">Sign Up</button>
<button class="reset-btn" onclick="clearVolunteers()">Reset Week</button>

</div>

<div id="list"></div>

<script>

// 🔐 ADMIN
const ADMIN_PASSWORD = "alice123";

// ✅ YOUR SUPABASE
const SUPABASE_URL = "https://aaspzzucirsjwhmfgrva.supabase.co";
const SUPABASE_KEY = "sb_publishable_gAMryTLf7AknfaUo2_2lFA_jHjTYuH2";

// ⚠️ IMPORTANT FIX (correct way to initialize)
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// DISPLAY
async function displayVolunteers(){

let { data, error } = await supabaseClient
.from("volunteers")
.select("*");

if(error){
console.error(error);
return;
}

// sync to localStorage (for homepage)
localStorage.setItem("studyBuddyVolunteers", JSON.stringify(data || []));

let listDiv = document.getElementById("list");
listDiv.innerHTML = "";

(data || []).forEach((v)=>{
let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<b>${v.name}</b><br>
<span class="badge">${v.day} • ${v.time}</span><br>
<button class="remove-btn" onclick="removeVolunteer(${v.id})">Remove</button>
`;

listDiv.appendChild(card);
});
}

// ADD
async function addVolunteer(){
let name = document.getElementById("name").value.trim();
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

if(name === ""){
alert("Please enter your name");
return;
}

let { error } = await supabaseClient
.from("volunteers")
.insert([{ name, day, time }]);

if(error){
console.error(error);
alert("Error saving");
return;
}

displayVolunteers();
document.getElementById("name").value = "";
}

// REMOVE
async function removeVolunteer(id){
let pass = prompt("Admin code to remove:");
if(pass !== ADMIN_PASSWORD){
alert("Wrong code!");
return;
}

await supabaseClient
.from("volunteers")
.delete()
.eq("id", id);

displayVolunteers();
}

// RESET
async function clearVolunteers(){
let pass = prompt("Admin code to reset:");
if(pass !== ADMIN_PASSWORD){
alert("Wrong code!");
return;
}

let confirmReset = confirm("Clear all volunteers AND bookings?");
if(!confirmReset) return;

// delete all
await supabaseClient
.from("volunteers")
.delete()
.neq("id", 0);

// clear local
localStorage.removeItem("studyBuddyVolunteers");
localStorage.removeItem("studyBuddyBookings");

displayVolunteers();
}

</script>

</body>
</html>

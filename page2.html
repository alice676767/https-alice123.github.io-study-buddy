<script>

const ADMIN_PASSWORD = "alice123";

function displayVolunteers(){
let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];
let listDiv = document.getElementById("list");
listDiv.innerHTML = "";

volunteers.forEach((v,index)=>{
let card = document.createElement("div");
card.className = "card";

card.innerHTML = `
<b>${v.name}</b><br>
<span class="badge">${v.day} • ${v.time}</span><br>
<button class="remove-btn" onclick="removeVolunteer(${index})">Remove</button>
`;

listDiv.appendChild(card);
});
}

function addVolunteer(){
let name = document.getElementById("name").value.trim();
let day = document.getElementById("day").value;
let time = document.getElementById("time").value;

if(name === ""){
alert("Please enter your name");
return;
}

let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];
volunteers.push({name, day, time});

localStorage.setItem("studyBuddyVolunteers", JSON.stringify(volunteers));

displayVolunteers();
document.getElementById("name").value = "";
}

function removeVolunteer(index){
let pass = prompt("Admin code to remove:");

if(pass === null) return;

if(pass.trim() !== ADMIN_PASSWORD){
alert("Wrong code!");
return;
}

let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];
volunteers.splice(index,1);
localStorage.setItem("studyBuddyVolunteers", JSON.stringify(volunteers));

displayVolunteers();
}

function clearVolunteers(){
let pass = prompt("Admin code to reset:");

if(pass === null) return;

if(pass.trim() !== ADMIN_PASSWORD){
alert("Wrong code!");
return;
}

let confirmReset = confirm("Clear all volunteers AND bookings?");
if(!confirmReset) return;

// 🔥 FIX: CLEAR BOTH
localStorage.removeItem("studyBuddyVolunteers");
localStorage.removeItem("studyBuddyBookings");

displayVolunteers();
}

</script>

<!DOCTYPE html>
<html>
<head>
<title>Volunteer - Study Buddy</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
}

header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:500;
}

.hero{
background:linear-gradient(to right, #1e293b, #3b82f6);
color:white;
text-align:center;
padding:80px 20px;
}

.hero h1{
font-size:45px;
margin:0;
}

.hero p{
margin-top:10px;
font-size:18px;
}

.form-box{
background:white;
max-width:400px;
margin:40px auto;
padding:30px;
border-radius:15px;
box-shadow:0 8px 20px rgba(0,0,0,0.1);
text-align:center;
}

input, select{
padding:12px;
margin:10px;
width:90%;
border:1px solid #ccc;
border-radius:8px;
font-size:14px;
}

.signup-btn{
padding:12px;
width:95%;
background:#3b82f6;
border:none;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
margin-top:10px;
transition:0.3s;
}

.signup-btn:hover{
background:#2563eb;
}

.reset-btn{
padding:10px;
background:#ef4444;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
margin-top:10px;
}

#list{
margin-top:30px;
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.card{
background:white;
padding:20px;
width:260px;
border-radius:15px;
box-shadow:0 6px 15px rgba(0,0,0,0.1);
text-align:left;
position:relative;
}

.card b{
font-size:18px;
}

.badge{
display:inline-block;
margin-top:10px;
background:#3b82f6;
color:white;
padding:5px 10px;
border-radius:20px;
font-size:12px;
}

.remove-btn{
margin-top:10px;
background:#ef4444;
border:none;
color:white;
padding:6px 10px;
border-radius:6px;
cursor:pointer;
font-size:12px;
}
</style>

</head>

<body onload="displayVolunteers()">

<div class="logo">
<img src="logo.png">
</div>

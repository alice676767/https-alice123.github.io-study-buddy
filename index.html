body{

<body onload="loadBookings(); highlightAvailable(); updateBookingsWithVolunteers();">

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Study Buddy Portal</h1>
<p>Book a peer study session during break time </p>
</section>

<section class="booking-section">

<h2>Book a Study Session</h2>

<table>

<tr>
<th>Time</th>
<th>Monday</th>
<th>Tuesday</th>
<th>Wednesday</th>
<th>Thursday</th>
<th>Friday</th>
</tr>

<tr>
<th>10:00-10:30</th>
<td class="slot" onclick="book(this,'Monday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Tuesday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Wednesday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Thursday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Friday','10:00-10:30')"></td>
</tr>

<tr>
<th>1:00-1:30</th>
<td class="slot" onclick="book(this,'Monday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Tuesday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Wednesday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Thursday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Friday','1:00-1:30')"></td>
</tr>

</table>

<p id="message"></p>

<input type="password" id="adminPass" placeholder="Enter code">
<button onclick="checkPassword()">Enter</button>

<button id="resetBtn" onclick="resetBookings()" style="margin-top:20px; display:none;">Reset Bookings</button>

</section>

<!-- 🌟 SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.29.0/dist/supabase.min.js"></script>
<script>
// 🔹 Supabase setup
const supabaseUrl = "https://aaspzzucirsjwhmfgrva.supabase.co";
const supabaseKey = "sb_publishable_gAMryTLf7AknfaUo2_2lFA_jHjTYuH2";
const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

// 🔹 LOAD BOOKINGS
async function loadBookings(){
  const { data: bookings, error } = await supabase
    .from('bookings')
    .select('*');
  
  if(error){ console.log(error); return; }

  let cells = document.querySelectorAll("td");
  cells.forEach(cell=>{
    cell.classList.remove("booked", "available");
    cell.classList.add("slot");
    cell.innerHTML = "";
  });

  bookings.forEach(b => {
    let cell = Array.from(document.querySelectorAll("td")).find(td=>{
      const onclick = td.getAttribute("onclick");
      if(!onclick) return false;
      return onclick.includes(`'${b.day}','${b.time}'`);
    });
    if(cell){
      cell.innerHTML = `${b.name}<br>${b.subject}<br><b>${b.helper || "No volunteer available"}</b>`;
      cell.classList.remove("slot");
      cell.classList.add("booked");
    }
  });

  highlightAvailable();
}

// 🔹 HIGHLIGHT AVAILABLE
async function highlightAvailable(){
  const { data: volunteers } = await supabase.from('volunteers').select('*');

  document.querySelectorAll("td.slot").forEach(cell=>{
    const onclick = cell.getAttribute("onclick");
    if(!onclick) return;
    let parts = onclick.match(/'(.*?)','(.*?)'/);
    if(!parts) return;
    let day = parts[1], time = parts[2];

    let match = volunteers.find(v => v.day === day && v.time === time);
    if(match) cell.classList.add("available");
  });
}

// 🔹 BOOK SLOT
async function book(cell, day, time){
  if(cell.classList.contains("booked")){
    document.getElementById("message").innerText = "This slot is already booked";
    return;
  }

  let name = prompt("Enter your name and class");
  let subject = prompt("Enter subject");
  if(!name) return;

  // Get volunteer if any
  const { data: volunteers } = await supabase.from('volunteers').select('*').eq('day', day).eq('time', time);
  let helper = volunteers.length ? volunteers[0].name : null;

  const { data, error } = await supabase.from('bookings').insert([{ name, subject, day, time, helper }]);
  if(error){ console.log(error); return; }

  loadBookings();
}

// 🔒 CHECK PASSWORD
function checkPassword(){
  let input = document.getElementById("adminPass").value;
  if(input === "alice123"){
    document.getElementById("resetBtn").style.display = "block";
    alert("Access granted");
  } else alert("Wrong password");
}

// 🔹 RESET BOOKINGS
async function resetBookings(){
  if(!confirm("Reset all bookings?")) return;
  await supabase.from('bookings').delete().neq('id', 0); // delete all
  loadBookings();
}
</script>

</body>
</html>

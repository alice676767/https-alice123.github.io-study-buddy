<!DOCTYPE html>
<html>
<head>
<title>Study Buddy Portal</title>

<!-- 🌟 Pretty Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
}

/* HEADER */
header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:500;
}

/* 🌟 HERO (UPGRADED) */
.hero{
background:linear-gradient(to right, #1e293b, #3b82f6);
color:white;
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:50px;
margin:0;
letter-spacing:2px;
}

.hero p{
margin-top:10px;
font-size:18px;
}

/* TABLE */
.booking-section{
background:white;
padding:60px;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
}

td, th{
padding:20px;
border:1px solid #ddd;
width:140px;
}

.slot{
background:#22c55e;
color:white;
cursor:pointer;
border-radius:8px;
}

/* 🔵 volunteer available */
.available{
background:#3b82f6;
}

/* 🔴 booked */
.booked{
background:#ef4444;
color:white;
}

/* MESSAGE */
#message{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body onload="loadBookings();">

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<!-- 🌟 HERO -->
<section class="hero">
<h1>Study Buddy Portal</h1>
<p>Book a peer study session during break time </p>
</section>

<section class="booking-section">

<h2>Book a Study Session</h2>

<table>

<tr>
<th>Time</th>
<th>Monday</th>
<th>Tuesday</th>
<th>Wednesday</th>
<th>Thursday</th>
<th>Friday</th>
</tr>

<tr>
<th>10:00-10:30</th>
<td class="slot" onclick="book(this,'Monday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Tuesday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Wednesday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Thursday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Friday','10:00-10:30')"></td>
</tr>

<tr>
<th>1:00-1:30</th>
<td class="slot" onclick="book(this,'Monday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Tuesday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Wednesday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Thursday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Friday','1:00-1:30')"></td>
</tr>

</table>

<p id="message"></p>

<!-- 🔒 ADMIN PASSWORD BOX -->
<input type="password" id="adminPass" placeholder="Enter admin code">
<button onclick="checkPassword()">Enter</button>

<!-- 🔒 HIDDEN RESET BUTTON -->
<button id="resetBtn" onclick="resetBookings()" style="margin-top:20px; display:none;">Reset Bookings</button>

</section>

<!-- 🌟 Supabase JS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// ----------------- SUPABASE CONNECTION -----------------
const SUPABASE_URL = "https://aaspzzucirsjwhmfgrva.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_gAMryTLf7AknfaUo2_2lFA_jHjTYuH2";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ----------------- LOAD BOOKINGS -----------------
async function loadBookings(){
  const { data, error } = await supabase.from("bookings").select("*");

  const cells = document.querySelectorAll("td");

  // Reset all cells first
  cells.forEach(cell => {
    cell.innerHTML = "";
    cell.classList.add("slot");
    cell.classList.remove("booked");
  });

  if(error){
    console.log("Error loading bookings:", error);
    return;
  }

  // Fill cells with bookings
  data.forEach(booking => {
    cells.forEach(cell => {
      let onclick = cell.getAttribute("onclick");
      if(onclick && onclick.includes("'" + booking.day + "','" + booking.time + "'")){
        cell.innerHTML = booking.name + "<br>" + booking.subject + "<br>" +
                         (booking.helper ? "<b>Helper: " + booking.helper + "</b>" : "<b>No volunteer available</b>");
        cell.classList.remove("slot");
        cell.classList.add("booked");
      }
    });
  });
}

// ----------------- SAVE BOOKING -----------------
async function saveBooking(day, time, name, subject, helper){
  const { data, error } = await supabase.from("bookings").insert([{ day, time, name, subject, helper }]);
  if(error) console.log("Error saving:", error);
}

// ----------------- BOOK SLOT -----------------
async function book(cell, day, time){
  if(cell.classList.contains("booked")){
    document.getElementById("message").innerText = "This slot is already booked";
    return;
  }

  let name = prompt("Enter your name and class");
  let subject = prompt("Enter subject");

  if(name){
    let helper = null; // you can add volunteer matching later

    cell.innerHTML = name + "<br>" + subject + "<br>" +
                     "<b>" + (helper ? "Helper: " + helper : "No volunteer available") + "</b>";
    cell.classList.remove("slot");
    cell.classList.add("booked");

    document.getElementById("message").innerText = helper ? "Matched with " + helper : "No volunteer available";

    await saveBooking(day, time, name, subject, helper);
  }
}

// ----------------- RESET BOOKINGS -----------------
async function resetBookings(){
  const { error } = await supabase.from("bookings").delete().neq('id', 0);
  if(error) console.log("Error resetting:", error);
  location.reload();
}

// ----------------- CHECK ADMIN PASSWORD -----------------
function checkPassword(){
  let input = document.getElementById("adminPass").value;
  if(input === "alice123"){
    document.getElementById("resetBtn").style.display = "block";
    alert("Access granted");
  } else {
    alert("Wrong password");
  }
}
</script>

</body>
</html>

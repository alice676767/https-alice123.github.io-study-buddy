<!DOCTYPE html>
<html>
<head>
<title>Study Buddy Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
}

header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:500;
}

.hero{
background:linear-gradient(to right, #1e293b, #3b82f6);
color:white;
text-align:center;
padding:100px 20px;
}

.booking-section{
background:white;
padding:60px;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
}

td, th{
padding:20px;
border:1px solid #ddd;
width:140px;
}

.slot{
background:#22c55e;
color:white;
cursor:pointer;
border-radius:8px;
}

.available{
background:#3b82f6;
}

.booked{
background:#ef4444;
color:white;
}

#message{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body onload="initPage()">

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Study Buddy Portal</h1>
<p>Book a peer study session during break time</p>
</section>

<section class="booking-section">

<h2>Book a Study Session</h2>

<table id="table">

<tr>
<th>Time</th>
<th>Monday</th>
<th>Tuesday</th>
<th>Wednesday</th>
<th>Thursday</th>
<th>Friday</th>
</tr>

<tr>
<th>10:00-10:30</th>
<td class="slot"></td>
<td class="slot"></td>
<td class="slot"></td>
<td class="slot"></td>
<td class="slot"></td>
</tr>

<tr>
<th>1:00-1:30</th>
<td class="slot"></td>
<td class="slot"></td>
<td class="slot"></td>
<td class="slot"></td>
<td class="slot"></td>
</tr>

</table>

<p id="message"></p>

<input type="password" id="adminPass" placeholder="Enter code">
<button onclick="checkPassword()">Enter</button>
<button id="resetBtn" onclick="resetBookings()" style="display:none;">Reset</button>

</section>

<script>

const days = ["Monday","Tuesday","Wednesday","Thursday","Friday"];
const times = ["10:00-10:30","1:00-1:30"];

// INIT PAGE (SAFE)
function initPage(){
attachClickEvents();
loadBookings();
highlightAvailable();
updateBookingsWithVolunteers();
}

// ADD CLICK EVENTS (NO onclick parsing anymore)
function attachClickEvents(){
let rows = document.querySelectorAll("#table tr");

for(let r=1; r<rows.length; r++){
let cells = rows[r].children;

for(let c=1; c<cells.length; c++){
let cell = cells[c];
let day = days[c-1];
let time = times[r-1];

cell.onclick = function(){
book(cell, day, time);
};
}
}
}

// SAVE
function saveBookings(){
let data = [];
document.querySelectorAll("td").forEach(cell=>{
data.push(cell.innerHTML);
});
localStorage.setItem("studyBuddyBookings", JSON.stringify(data));
}

// LOAD
function loadBookings(){
let data = JSON.parse(localStorage.getItem("studyBuddyBookings")) || [];
let cells = document.querySelectorAll("td");

cells.forEach((cell,i)=>{
if(data[i]){
cell.innerHTML = data[i];
cell.classList.add("booked");
cell.classList.remove("slot");
}
});
}

// RESET
function resetBookings(){
localStorage.removeItem("studyBuddyBookings");
location.reload();
}

// SHOW AVAILABLE
function highlightAvailable(){
let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];

let rows = document.querySelectorAll("#table tr");

for(let r=1; r<rows.length; r++){
let cells = rows[r].children;

for(let c=1; c<cells.length; c++){
let cell = cells[c];
if(!cell.classList.contains("slot")) continue;

let day = days[c-1];
let time = times[r-1];

let match = volunteers.find(v => v.day === day && v.time === time);

if(match){
cell.classList.add("available");
}
}
}
}

// UPDATE BOOKINGS
function updateBookingsWithVolunteers(){
let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];

let rows = document.querySelectorAll("#table tr");

for(let r=1; r<rows.length; r++){
let cells = rows[r].children;

for(let c=1; c<cells.length; c++){
let cell = cells[c];

if(cell.classList.contains("booked") && cell.innerHTML.includes("No volunteer available")){

let day = days[c-1];
let time = times[r-1];

let match = volunteers.find(v => v.day === day && v.time === time);

if(match){
cell.innerHTML = cell.innerHTML.replace("No volunteer available", "Helper: " + match.name);
saveBookings();
}
}
}
}
}

// BOOK
function book(cell,day,time){

if(cell.classList.contains("booked")){
document.getElementById("message").innerText = "Already booked";
return;
}

let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];
let match = volunteers.find(v => v.day === day && v.time === time);

let name = prompt("Enter your name");
let subject = prompt("Enter subject");

if(name){

if(match){
cell.innerHTML = name + "<br>" + subject + "<br><b>Helper: " + match.name + "</b>";
}else{
cell.innerHTML = name + "<br>" + subject + "<br><b>No volunteer available</b>";
}

cell.classList.add("booked");
cell.classList.remove("slot");

saveBookings();
}
}

// PASSWORD
function checkPassword(){
if(document.getElementById("adminPass").value === "alice123"){
document.getElementById("resetBtn").style.display = "block";
alert("Access granted");
}else{
alert("Wrong password");
}
}

</script>

</body>
</html>

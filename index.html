<!DOCTYPE html>
<html>
<head>
<title>Study Buddy Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
}

header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:500;
}

.hero{
background:linear-gradient(to right, #1e293b, #3b82f6);
color:white;
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:50px;
margin:0;
}

.booking-section{
background:white;
padding:60px;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
}

td, th{
padding:20px;
border:1px solid #ddd;
width:140px;
}

.slot{
background:#22c55e;
color:white;
cursor:pointer;
border-radius:8px;
}

.available{
background:#3b82f6;
}

.booked{
background:#ef4444;
color:white;
}

#message{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body onload="loadBookings(); highlightAvailable(); updateBookingsWithVolunteers();">

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Study Buddy Portal</h1>
<p>Book a peer study session during break time</p>
</section>

<section class="booking-section">

<h2>Book a Study Session</h2>

<table>

<tr>
<th>Time</th>
<th>Monday</th>
<th>Tuesday</th>
<th>Wednesday</th>
<th>Thursday</th>
<th>Friday</th>
</tr>

<tr>
<th>10:00-10:30</th>
<td class="slot" data-day="Monday" data-time="10:00-10:30" onclick="book(this)"></td>
<td class="slot" data-day="Tuesday" data-time="10:00-10:30" onclick="book(this)"></td>
<td class="slot" data-day="Wednesday" data-time="10:00-10:30" onclick="book(this)"></td>
<td class="slot" data-day="Thursday" data-time="10:00-10:30" onclick="book(this)"></td>
<td class="slot" data-day="Friday" data-time="10:00-10:30" onclick="book(this)"></td>
</tr>

<tr>
<th>1:00-1:30</th>
<td class="slot" data-day="Monday" data-time="1:00-1:30" onclick="book(this)"></td>
<td class="slot" data-day="Tuesday" data-time="1:00-1:30" onclick="book(this)"></td>
<td class="slot" data-day="Wednesday" data-time="1:00-1:30" onclick="book(this)"></td>
<td class="slot" data-day="Thursday" data-time="1:00-1:30" onclick="book(this)"></td>
<td class="slot" data-day="Friday" data-time="1:00-1:30" onclick="book(this)"></td>
</tr>

</table>

<p id="message"></p>

<input type="password" id="adminPass" placeholder="Enter code">
<button onclick="checkPassword()">Enter</button>

<button id="resetBtn" onclick="resetBookings()" style="margin-top:20px; display:none;">Reset Bookings</button>

</section>

<script>

function saveBookings(){
let data = [];
document.querySelectorAll("td").forEach(cell=>{
data.push({
html: cell.innerHTML,
day: cell.dataset.day,
time: cell.dataset.time,
class: cell.className
});
});
localStorage.setItem("studyBuddyBookings", JSON.stringify(data));
}

function loadBookings(){
let data = JSON.parse(localStorage.getItem("studyBuddyBookings")) || [];
let cells = document.querySelectorAll("td");

cells.forEach((cell,index)=>{
if(data[index]){
cell.innerHTML = data[index].html;
cell.className = data[index].class;
}
});
}

function resetBookings(){
localStorage.removeItem("studyBuddyBookings");
location.reload();
}

function highlightAvailable(){
let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];

document.querySelectorAll("td.slot").forEach(cell=>{
let day = cell.dataset.day;
let time = cell.dataset.time;

let match = volunteers.find(v => v.day === day && v.time === time);

if(match){
cell.classList.add("available");
}
});
}

function updateBookingsWithVolunteers(){
let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];

document.querySelectorAll("td.booked").forEach(cell=>{

if(cell.innerHTML.includes("No volunteer available")){

let day = cell.dataset.day;
let time = cell.dataset.time;

let match = volunteers.find(v => v.day === day && v.time === time);

if(match){
cell.innerHTML = cell.innerHTML.replace("No volunteer available", "Helper: " + match.name);
saveBookings();
}
}

});
}

function book(cell){

let day = cell.dataset.day;
let time = cell.dataset.time;

if(cell.classList.contains("booked")){
document.getElementById("message").innerText = "This slot is already booked";
return;
}

let volunteers = JSON.parse(localStorage.getItem("studyBuddyVolunteers")) || [];
let match = volunteers.find(v => v.day === day && v.time === time);

let name = prompt("Enter your name and class");
let subject = prompt("Enter subject");

if(name){

if(match){
cell.innerHTML = name + "<br>" + subject + "<br><b>Helper: " + match.name + "</b>";
document.getElementById("message").innerText = "Matched with " + match.name;
}else{
cell.innerHTML = name + "<br>" + subject + "<br><b>No volunteer available</b>";
document.getElementById("message").innerText = "No volunteer available";
}

cell.classList.remove("slot");
cell.classList.add("booked");

saveBookings();
}
}

function checkPassword(){
let input = document.getElementById("adminPass").value;

if(input === "alice123"){
document.getElementById("resetBtn").style.display = "block";
alert("Access granted");
}else{
alert("Wrong password");
}
}

</script>

</body>
</html>

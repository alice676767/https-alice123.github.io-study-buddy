<!DOCTYPE html>
<html>
<head>
<title>Study Buddy Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Poppins', sans-serif;
background:#f5f5f5;
}

header{
background:#0f172a;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
}

.logo img{
height:50px;
}

nav a{
color:white;
margin:0 15px;
text-decoration:none;
font-weight:500;
}

.hero{
background:linear-gradient(to right, #1e293b, #3b82f6);
color:white;
text-align:center;
padding:100px 20px;
}

.hero h1{
font-size:50px;
margin:0;
}

.booking-section{
background:white;
padding:60px;
text-align:center;
}

table{
margin:auto;
border-collapse:collapse;
}

td, th{
padding:20px;
border:1px solid #ddd;
width:140px;
}

.slot{
background:#22c55e;
color:white;
cursor:pointer;
border-radius:8px;
}

.available{
background:#3b82f6;
}

.booked{
background:#ef4444;
color:white;
}

#message{
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<header>
<div class="logo">
<img src="logo.png">
</div>

<nav>
<a href="about.html">About</a>
<a href="index.html">Home</a>
<a href="page2.html">Volunteer</a>
<a href="contact.html">Contact</a>
</nav>
</header>

<section class="hero">
<h1>Study Buddy Portal</h1>
<p>Book a peer study session</p>
</section>

<section class="booking-section">

<h2>Book a Study Session</h2>

<table>

<tr>
<th>Time</th>
<th>Monday</th>
<th>Tuesday</th>
<th>Wednesday</th>
<th>Thursday</th>
<th>Friday</th>
</tr>

<tr>
<th>10:00-10:30</th>
<td class="slot" onclick="book(this,'Monday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Tuesday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Wednesday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Thursday','10:00-10:30')"></td>
<td class="slot" onclick="book(this,'Friday','10:00-10:30')"></td>
</tr>

<tr>
<th>1:00-1:30</th>
<td class="slot" onclick="book(this,'Monday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Tuesday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Wednesday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Thursday','1:00-1:30')"></td>
<td class="slot" onclick="book(this,'Friday','1:00-1:30')"></td>
</tr>

</table>

<p id="message"></p>

<input type="password" id="adminPass" placeholder="Enter code">
<button onclick="checkPassword()">Enter</button>

<button id="resetBtn" onclick="resetBookings()" style="display:none; margin-top:20px;">Reset Bookings</button>

</section>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://aaspzzucirsjwhmfgrva.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_gAMryTLf7AknfaUo2_2lFA_jHjTYuH2";
const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

console.log("🔥 Supabase script loaded");

// ✅ THIS FIXES GITHUB PAGES ISSUE
window.addEventListener("DOMContentLoaded", () => {
  console.log("🚀 Page loaded");
  loadBookings();
});

// LOAD BOOKINGS
async function loadBookings(){

let res1 = await supabaseClient.from("bookings").select("*");
let res2 = await supabaseClient.from("volunteers").select("*");

console.log("Bookings:", res1);
console.log("Volunteers:", res2);

if(res1.error || res2.error){
document.getElementById("message").innerText = "⚠️ Database error - check console";
return;
}

let bookings = res1.data || [];
let volunteers = res2.data || [];

// AVAILABLE
document.querySelectorAll("td.slot").forEach(cell=>{
let onclick = cell.getAttribute("onclick");
if(!onclick) return;

let parts = onclick.match(/'(.*?)','(.*?)'/);
let day = parts[1];
let time = parts[2];

let match = volunteers.find(v => v.day === day && v.time === time);
if(match){
cell.classList.add("available");
}
});

// BOOKINGS
bookings.forEach(b => {
document.querySelectorAll("td").forEach(cell => {
let onclick = cell.getAttribute("onclick");
if(!onclick) return;

let parts = onclick.match(/'(.*?)','(.*?)'/);
let day = parts[1];
let time = parts[2];

if(b.day === day && b.time === time){
cell.innerHTML = b.name + "<br>" + b.subject + "<br><b>Helper: " + (b.helper || "None") + "</b>";
cell.classList.remove("slot");
cell.classList.add("booked");
}
});
});

}

// BOOK
async function book(cell,day,time){

if(cell.classList.contains("booked")){
document.getElementById("message").innerText = "Already booked";
return;
}

let name = prompt("Enter your name and class");
let subject = prompt("Enter subject");

if(!name) return;

let { data: volunteers } = await supabaseClient.from("volunteers").select("*");
let match = volunteers.find(v => v.day === day && v.time === time);

let helper = match ? match.name : null;

let result = await supabaseClient.from("bookings").insert([
{ name, subject, day, time, helper }
]);

if(result.error){
alert("Error saving booking");
return;
}

location.reload();
}

// RESET
async function resetBookings(){
await supabaseClient.from("bookings").delete().neq("id", 0);
location.reload();
}

// PASSWORD
function checkPassword(){
let input = document.getElementById("adminPass").value;

if(input === "alice123"){
document.getElementById("resetBtn").style.display = "block";
alert("Access granted");
}else{
alert("Wrong password");
}
}

</script>

</body>
</html>
